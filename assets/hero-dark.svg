<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" width="1000" height="250" role="img" aria-label="Artur Müller — criador, dev web, RPG e IA">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b1033">
        <animate attributeName="stop-color" values="#1b1033;#2a1a4f;#15224a;#1b1033" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0c1733">
        <animate attributeName="stop-color" values="#0c1733;#15224a;#2a1a4f;#0c1733" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="250" fill="url(#bg)"/>

  <!-- knight motif -->
  <text x="815" y="205" font-size="230" font-family="Georgia, 'Times New Roman', serif" fill="#ffffff" opacity="0.10">&#9822;</text>

  <!-- floating particles -->
  <g fill="#8b5cf6">
    <circle cx="650" cy="60" r="3" opacity="0.6"><animate attributeName="cy" values="60;40;60" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="190" r="2.5" opacity="0.5"><animate attributeName="cy" values="190;205;190" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="930" cy="90" r="2" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="150" r="2" opacity="0.4"><animate attributeName="cy" values="150;135;150" dur="5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- prompt -->
  <text x="70" y="92" font-family="'Cascadia Code','Consolas',monospace" font-size="21" fill="#8b5cf6" opacity="0">
    ~/arturmuller25 $ whoami
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.6s" fill="freeze"/>
  </text>

  <!-- name -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.7s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 22" to="0 0" begin="0.6s" dur="0.7s" fill="freeze"/>
    <text x="68" y="168" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-weight="800" font-size="66" fill="#ffffff">Artur Müller</text>
  </g>

  <!-- accent underline -->
  <line x1="72" y1="186" x2="600" y2="186" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" stroke-dasharray="540" stroke-dashoffset="540">
    <animate attributeName="stroke-dashoffset" from="540" to="0" begin="1.1s" dur="1.1s" fill="freeze"/>
  </line>

  <!-- subtitle -->
  <text x="74" y="220" font-family="'Cascadia Code','Consolas',monospace" font-size="22" fill="#c9bcf3" opacity="0">
    Desenvolvedor em forma&#231;&#227;o &#8226; Web &#8226; Intelig&#234;ncia Artificial
    <tspan fill="#8b5cf6">&#9612;<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></tspan>
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.6s" fill="freeze"/>
  </text>
</svg>

name: Gerar animação da cobrinha

on:
  # Atualiza a cada 12 horas
  schedule:
    - cron: "0 */12 * * *"
  # Permite rodar manualmente na aba Actions
  workflow_dispatch:
  # Roda quando houver push na branch main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Gerar SVGs da cobrinha
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#8b5cf6&color_dots=#ede9fe,#c4b5fd,#a78bfa,#8b5cf6,#6d28d9
            dist/github-contribution-grid-snake-dark.svg?color_snake=#a78bfa&color_dots=#161b22,#3b2d63,#5b3fa0,#7c5cd6,#a78bfa

      - name: Publicar na branch output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

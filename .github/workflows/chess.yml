name: Xadrez jogável

on:
  # Cada lance é uma issue com título "chess|move|<uci>"
  issues:
    types: [opened]
  # Permite re-renderizar/semear o tabuleiro manualmente
  workflow_dispatch:

# Garante que os lances sejam processados um de cada vez (sem corrida de estado)
concurrency:
  group: chess-game
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  play:
    # Só roda para o dispatch manual ou para issues de lance (ignora outras issues)
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.issue.title, 'chess|move|') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq stockfish || echo "Stockfish indisponível — usarei o fallback."
          python -m pip install --quiet chess

      - name: Processar lance / renderizar tabuleiro
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/chess_game.py

      - name: Commit do estado do jogo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nada a commitar."
          else
            git commit -m "chore(xadrez): atualiza tabuleiro ♟️"
            git push
          fi

      - name: Responder e fechar a issue
        if: ${{ github.event_name == 'issues' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body-file game/_comment.md || true
          gh issue close "${{ github.event.issue.number }}" || true
